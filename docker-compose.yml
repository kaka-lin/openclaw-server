services:
  openclaw-gateway:
    build: .
    container_name: "openclaw-gateway"
    restart: unless-stopped # 開機自動重啟
    ports:
      # 開放區域網路/外網存取 (對應 OPENCLAW_GATEWAY_BIND=lan)
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"

    # 宣告 &openclaw-volumes 把共用的硬碟掛載打包
    volumes:
      # Openclaw 設定目錄
      &openclaw-volumes
      - ${OPENCLAW_CONFIG_DIR:-${HOME}/.openclaw}:/home/node/.openclaw
      # Openclaw 工作目錄
      - ${OPENCLAW_WORKSPACE_DIR:-${HOME}/.openclaw/workspace}:/home/node/.openclaw/workspace

    # 宣告 &openclaw-env-file 把共用的變數讀取檔案打包
    env_file: &openclaw-env-file
      - .env

    environment:
      TZ: ${TZ:-Asia/Taipei}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      # 輪詢卡死偵測 (預設 3 分鐘)
      TELEGRAM_POLLING_STALL_TIMEOUT: ${TELEGRAM_POLLING_STALL_TIMEOUT:-180000}

    # 內網 DNS 無法穩定解析外部域名，強制使用公共 DNS
    # 確保關閉 VPN 後 Telegram polling / LLM API 仍能正常運作
    dns:
      - 1.1.1.1
      - 8.8.8.8

  openclaw-cli:
    build: .
    container_name: "openclaw-cli"
    # 只有在明確下令 docker compose --profile cli 才被啟用
    profiles:
      - cli
    # 與 gateway 共用 network namespace，方便直接操作同一套 OpenClaw 環境
    network_mode: "service:openclaw-gateway"
    entrypoint: [ "node", "dist/index.js" ]

    # 💡 呼叫 YAML Alias 直接把設定原封不動套用過來！
    volumes: *openclaw-volumes
    env_file: *openclaw-env-file
